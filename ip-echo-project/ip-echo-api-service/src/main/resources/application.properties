# ---------------------------------------------------------
# SERVER CONFIGURATION
# ---------------------------------------------------------
server.port=8088

# ---------------------------------------------------------
# ACTUATOR ENDPOINT REMOVAL
management.endpoints.web.base-path=/

# Expose the health endpoint
management.endpoints.web.exposure.include=health

# Map the standard health logic to /health
management.endpoints.web.path-mapping.health=health

# ---------------------------------------------------------
# Enabling Health Groups to separate Liveness from Readiness
management.endpoint.health.probes.enabled=true

# Define the 'ready' group
# This includes checks for the app being up AND its ability to serve traffic
management.endpoint.health.group.ready.include=ping,diskSpace
management.endpoint.health.group.ready.show-details=always

# To get literal '/ready', we must map the group path in the web mapping.
management.endpoints.web.path-mapping.health=health
# We use a redirect/alias strategy or direct group mapping:
management.endpoint.health.group.ready.show-components=always
