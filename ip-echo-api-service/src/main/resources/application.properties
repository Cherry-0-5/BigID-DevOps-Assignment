# ---------------------------------------------------------
# SERVER & PROXY CONFIGURATION 
server.port=8088

# Tell Spring to trust and use X-Forwarded-For headers
server.forward-headers-strategy=framework
server.tomcat.remoteip.remote-ip-header=x-forwarded-for
server.tomcat.remoteip.protocol-header=x-forwarded-proto
server.tomcat.remoteip.internal-proxies=.*

# ACTUATOR & HEALTH ENDPOINTS
management.endpoints.web.base-path=/
management.endpoints.web.exposure.include=health

# Map standard health logic to /health and /ready
management.endpoints.web.path-mapping.health=health
management.endpoint.health.probes.enabled=true

# Define the 'ready' group
management.endpoint.health.group.ready.include=ping,diskSpace
management.endpoint.health.group.ready.show-details=always
management.endpoint.health.group.ready.show-components=always
